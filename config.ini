# Thermal Camera Driver Configuration
# 
# This file contains configuration settings for the thermal camera driver system.
# Modify these settings according to your hardware setup and requirements.

[camera]
# Single camera settings
default_device = 0
default_port = 
default_baudrate = 921600

# Dual camera settings
dual_camera_a_device = 1
dual_camera_a_port = COM4
dual_camera_b_device = 2
dual_camera_b_port = COM6

# Video settings
frame_width = 640
frame_height = 514
video_format = Y16
buffer_size = 1

[lepton]
# FLIR Lepton camera settings
default_device = 0
# Lepton 3.5 is 160x120, Lepton 2 is 80x60
expected_width = 160
expected_height = 120
output_dir = lepton_recordings

[recording]
# Default recording settings
default_duration = 10
compression_level = 3
auto_create_directories = true

# Output directories
single_camera_output_dir = recordings
dual_camera_output_dir = dual_data

[display]
# Live view settings
colormap = COLORMAP_TURBO
window_resizable = true
flip_horizontal = true

# Analysis settings
export_frame_format = png
temperature_unit = celsius

[logging]
# Logging configuration
log_level = WARNING
log_to_file = false
log_file = thermal_camera.log